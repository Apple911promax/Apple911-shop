<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEGAL CENTER | Apple911</title>
  <style>
    :root{--bg:#05070d;--panel:#0b111c;--cyan:#00f3ff;--gold:#e2c78e;--line:#1b3146;--text:#d7dee8;--muted:#8190a4}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#0a1b2a 0,#05070d 38%,#02040a 100%);color:var(--text);font-family:Arial,"Noto Sans TC",sans-serif;letter-spacing:.02em}
    body:before{content:"";position:fixed;inset:0;background:linear-gradient(rgba(0,243,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,243,255,.03) 1px,transparent 1px);background-size:34px 34px;pointer-events:none}
    a{color:inherit;text-decoration:none}.wrap{position:relative;z-index:1;width:min(100%,980px);margin:0 auto;padding:48px 18px 64px}.top{border:1px solid rgba(0,243,255,.35);background:rgba(11,17,28,.88);padding:28px 22px;clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,18px 100%,0 calc(100% - 18px));box-shadow:0 0 28px rgba(0,243,255,.12)}
    .brand{font-size:12px;color:var(--cyan);font-weight:800;letter-spacing:.18em}.title{margin:10px 0 8px;font-size:clamp(34px,8vw,72px);line-height:.95;color:#fff;font-weight:900}.sub{color:var(--gold);font-size:12px;font-weight:800;letter-spacing:.16em}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:24px}.card{display:block;border:1px solid var(--line);background:linear-gradient(135deg,rgba(11,17,28,.96),rgba(6,12,20,.96));padding:20px;min-height:116px;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));transition:.18s}
    .card:hover{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,243,255,.16);transform:translateY(-2px)}.num{color:var(--gold);font-size:11px;font-weight:800}.name{margin-top:18px;color:#fff;font-weight:900}.en{margin-top:5px;color:var(--cyan);font-size:11px;font-weight:800;letter-spacing:.14em}.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}.btn{border:1px solid var(--line);padding:10px 14px;color:var(--muted);font-size:12px;font-weight:800}.btn:hover{border-color:var(--cyan);color:var(--cyan)}
    @media(max-width:640px){.grid{grid-template-columns:1fr}.wrap{padding-top:28px}.top{padding:24px 18px}.card{min-height:104px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <div class="brand">APPLE911 SYSTEM UI</div>
      <h1 class="title">LEGAL CENTER</h1>
      <div class="sub">ACCESSING APPLE911 LEGAL DATABASE...</div>
      <div class="grid">
        <a class="card" href="/legal/privacy.html"><div class="num">01</div><div class="name">隱私權政策</div><div class="en">PRIVACY POLICY</div></a>
        <a class="card" href="/legal/terms.html"><div class="num">02</div><div class="name">服務條款</div><div class="en">TERMS OF SERVICE</div></a>
        <a class="card" href="/legal/refund.html"><div class="num">03</div><div class="name">退款政策</div><div class="en">REFUND POLICY</div></a>
        <a class="card" href="/legal/shipping.html"><div class="num">04</div><div class="name">配送政策</div><div class="en">SHIPPING POLICY</div></a>
        <a class="card" href="/legal/warranty.html"><div class="num">05</div><div class="name">維修保固</div><div class="en">WARRANTY POLICY</div></a>
      </div>
      <div class="nav"><a class="btn" href="/">返回首頁</a></div>
    </section>
  </main>
</body>
</html>
