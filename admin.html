<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple 911 | 後台管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Noto Sans TC', 'sans-serif'], tech: ['Rajdhani', 'sans-serif'], esport: ['Orbitron', 'sans-serif'] },
          colors: { darkbg: '#050505', panelbg: '#0a0f18', neoncyan: '#00f3ff', neonred: '#ff003c', goldlight: '#e2c78e', golddark: '#b38539' }
        }
      }
    }
  </script>
  <style>
    body { background-color:#050505; background-image:radial-gradient(rgba(0,243,255,.05) 1px,transparent 1px); background-size:30px 30px; color:#e2e8f0; min-height:100vh; overflow-x:hidden; }
    .tech-clip { clip-path:polygon(15px 0,100% 0,100% calc(100% - 15px),calc(100% - 15px) 100%,0 100%,0 15px); }
    .tech-btn  { clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px); transition:all .2s; }
    .tech-btn:active { transform:scale(.95); }
    .text-gold-gradient { background:linear-gradient(135deg,#e2c78e 0%,#b38539 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
    ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:#00f3ff; border-radius:4px; }
    .status-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.7rem; font-weight:700; }
    .badge-未付款 { background:rgba(255,0,60,.15); color:#ff003c; border:1px solid #ff003c55; }
    .badge-已付款 { background:rgba(0,243,255,.12); color:#00f3ff; border:1px solid #00f3ff55; }
    .badge-處理中 { background:rgba(250,204,21,.12); color:#facc15; border:1px solid #facc1555; }
    .badge-已出貨 { background:rgba(59,130,246,.12); color:#60a5fa; border:1px solid #60a5fa55; }
    .badge-已完成 { background:rgba(34,197,94,.12); color:#4ade80; border:1px solid #4ade8055; }
    .badge-已取消 { background:rgba(100,116,139,.15); color:#cbd5e1; border:1px solid #94a3b855; }
    .nav-item { transition:all .2s; }
    .nav-item.active { color:#00f3ff !important; background:rgba(0,243,255,.08); border-left:2px solid #00f3ff !important; text-shadow:0 0 8px rgba(0,243,255,.4); }
    .page { display:none; }
    .page.active { display:block; }

    /* 後台訂單管理文字色彩調整 */
    #page-orders { color:#e5e7eb; }
    #page-orders .text-white { color:#ffffff; }
    #page-orders .text-gray-300 { color:#f1f5f9; }
    #page-orders .text-gray-400 { color:#cbd5e1; }
    #page-orders .text-gray-500 { color:#cbd5e1; }
    #page-orders .text-gray-600 { color:#cbd5e1; }
    #page-orders .text-gray-600.uppercase { color:#cbd5e1; }
    #page-orders .text-gray-700 { color:#cbd5e1; }
    #page-orders .bg-panelbg, #page-orders .bg-darkbg { background-color:#0b1220; }
    #page-orders .status-badge.badge-已取消 { color:#d1d5db; background:rgba(100,116,139,.18); }
    #page-orders select, #page-orders input { color:#e5e7eb; }
    #page-orders select { background-color:#0a0f18 !important; color:#00f3ff !important; }
    #page-orders select option { background-color:#0a0f18; color:#00f3ff; }
    #page-orders select option:checked { background-color:#00f3ff; color:#000000; }
    #filter-status, #filter-status option { color:#00f3ff !important; background-color:#0a0f18 !important; }
    select[id^="status-select-"] { background-color:#0a0f18 !important; color:#00f3ff !important; }
    select[id^="status-select-"] option { background-color:#0a0f18; color:#00f3ff; }
    select[id^="status-select-"] option:checked { background-color:#00f3ff; color:#000000; }
    input, select, textarea { outline:none; font-size:16px!important; }
  </style>
</head>
<body class="font-sans antialiased">

  <!-- ══════════════════════════════════════════════════════
       登入畫面
  ══════════════════════════════════════════════════════ -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-panelbg border border-cyan-500 tech-clip w-full max-w-sm shadow-[0_0_30px_rgba(0,243,255,0.15)]">
      <div class="p-8">
        <h1 class="font-esport text-2xl font-black tracking-widest text-white text-center mb-1">
          APPLE<span class="text-gold-gradient">911</span>
        </h1>
        <p class="text-center text-neoncyan text-xs tracking-widest mb-8">ADMIN SYSTEM</p>
        <div class="space-y-4">
          <div>
            <label class="text-xs text-neoncyan block mb-1">管理員信箱</label>
            <input id="admin-password" type="email" placeholder="請輸入管理員信箱"
              class="w-full bg-darkbg border border-slate-600 text-white p-3 tech-clip text-sm focus:border-neoncyan transition"
              onkeydown="if(event.key==='Enter')doLogin()">
          </div>
          <div>
            <label class="text-xs text-neoncyan block mb-1">管理員密碼</label>
            <input id="admin-pass-field" type="password" placeholder="請輸入密碼"
              class="w-full bg-darkbg border border-slate-600 text-white p-3 tech-clip text-sm focus:border-neoncyan transition"
              onkeydown="if(event.key==='Enter')doLogin()">
          </div>
          <p id="login-error" class="text-neonred text-xs hidden">密碼錯誤，請重試</p>
          <button onclick="doLogin()"
            class="w-full py-3 bg-neoncyan text-black font-bold tech-btn text-sm tracking-widest hover:bg-white transition">
            LOGIN
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       後台主體
  ══════════════════════════════════════════════════════ -->
  <div id="admin-main" class="hidden flex-col min-h-screen">

    <!-- 頂部導覽 -->
    <nav class="sticky top-0 z-40 bg-panelbg/95 backdrop-blur-md border-b-2 border-neoncyan/50 shadow-[0_0_15px_rgba(0,243,255,0.15)]">
      <div class="px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <button id="sidebar-toggle" type="button" onclick="toggleSidebar()" class="text-neoncyan p-1">
            <i class="fa-solid fa-bars text-xl"></i>
          </button>
          <div class="font-esport text-xl font-black tracking-widest text-white flex items-center gap-2">
            APPLE<span class="text-gold-gradient">911</span>
            <span class="text-xs text-neoncyan font-sans font-normal tracking-widest ml-1">ADMIN</span>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <button onclick="refreshCurrent()" class="text-xs text-gray-400 hover:text-neoncyan transition font-bold">
            <i class="fa-solid fa-rotate-right mr-1"></i><span class="hidden sm:inline">重新整理</span>
          </button>
          <button onclick="doLogout()" class="text-xs text-neonred hover:text-white transition font-bold">
            <i class="fa-solid fa-right-from-bracket mr-1"></i><span class="hidden sm:inline">登出</span>
          </button>
        </div>
      </div>
    </nav>

    <!-- 左側選單 + 右側內容 -->
    <div class="flex flex-1" style="min-height:calc(100vh - 53px)">

      <!-- 桌面左側選單 -->
      <aside id="sidebar-desktop" class="hidden md:flex flex-col w-56 shrink-0 bg-panelbg border-r border-neoncyan/20">
        <div class="p-4 border-b border-slate-800">
          <p class="text-[10px] text-gray-600 tracking-widest uppercase font-bold">系統選單庫</p>
          <p class="text-[9px] text-gray-700 tracking-widest font-tech">SYSTEM DATABASE</p>
        </div>
        <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
          <button onclick="switchPage('dashboard')" id="nav-dashboard"
            class="nav-item active w-full text-left px-4 py-3 text-sm font-bold text-gray-400 flex items-center gap-3 border-l-2 border-transparent">
            <i class="fa-solid fa-gauge-high w-4 text-center"></i>控制台
          </button>
          <button onclick="switchPage('members-orders')" id="nav-members-orders"
            class="nav-item w-full text-left px-4 py-3 text-sm font-bold text-gray-400 flex items-center gap-3 border-l-2 border-transparent hover:text-white hover:bg-white/5">
            <i class="fa-solid fa-users-gear w-4 text-center"></i>會員訂單管理
          </button>
          <button onclick="switchPage('products')" id="nav-products"
            class="nav-item w-full text-left px-4 py-3 text-sm font-bold text-gray-400 flex items-center gap-3 border-l-2 border-transparent hover:text-white hover:bg-white/5">
            <i class="fa-solid fa-box w-4 text-center"></i>商品管理
          </button>
          <button onclick="switchPage('coupons')" id="nav-coupons"
            class="nav-item w-full text-left px-4 py-3 text-sm font-bold text-gray-400 flex items-center gap-3 border-l-2 border-transparent hover:text-white hover:bg-white/5">
            <i class="fa-solid fa-ticket w-4 text-center"></i>優惠券管理
          </button>
          <button onclick="switchPage('settings')" id="nav-settings"
            class="nav-item w-full text-left px-4 py-3 text-sm font-bold text-gray-400 flex items-center gap-3 border-l-2 border-transparent hover:text-white hover:bg-white/5">
            <i class="fa-solid fa-gear w-4 text-center"></i>系統設定
          </button>
        </nav>
        <div class="p-4 border-t border-slate-800 text-[9px] text-slate-700 tracking-widest">&copy; 2026 APPLE 911</div>
      </aside>

      <!-- 手機側選單 overlay -->
      <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/70 z-20 md:hidden" onclick="toggleSidebar()"></div>
      <aside id="sidebar-mobile" class="hidden fixed inset-y-0 left-0 w-56 bg-panelbg border-r border-neoncyan/30 z-30 flex-col shadow-[5px_0_20px_rgba(0,243,255,0.1)] md:hidden">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center">
          <p class="text-[10px] text-gray-600 tracking-widest uppercase font-bold">系統選單庫</p>
          <button onclick="toggleSidebar()" class="text-neoncyan text-lg"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
          <button onclick="switchPage('dashboard');toggleSidebar()" id="nav-m-dashboard"
            class="nav-item active w-full text-left px-4 py-3 text-sm font-bold text-gray-400 flex items-center gap-3 border-l-2 border-transparent">
            <i class="fa-solid fa-gauge-high w-4 text-center"></i>控制台
          </button>
          <button onclick="switchPage('members-orders');toggleSidebar()" id="nav-m-members-orders"
            class="nav-item w-full text-left px-4 py-3 text-sm font-bold text-gray-400 flex items-center gap-3 border-l-2 border-transparent hover:text-white hover:bg-white/5">
            <i class="fa-solid fa-users-gear w-4 text-center"></i>會員訂單管理
          </button>
          <button onclick="switchPage('products');toggleSidebar()" id="nav-m-products"
            class="nav-item w-full text-left px-4 py-3 text-sm font-bold text-gray-400 flex items-center gap-3 border-l-2 border-transparent hover:text-white hover:bg-white/5">
            <i class="fa-solid fa-box w-4 text-center"></i>商品管理
          </button>
          <button onclick="switchPage('coupons');toggleSidebar()" id="nav-m-coupons"
            class="nav-item w-full text-left px-4 py-3 text-sm font-bold text-gray-400 flex items-center gap-3 border-l-2 border-transparent hover:text-white hover:bg-white/5">
            <i class="fa-solid fa-ticket w-4 text-center"></i>優惠券管理
          </button>
          <button onclick="switchPage('settings');toggleSidebar()" id="nav-m-settings"
            class="nav-item w-full text-left px-4 py-3 text-sm font-bold text-gray-400 flex items-center gap-3 border-l-2 border-transparent hover:text-white hover:bg-white/5">
            <i class="fa-solid fa-gear w-4 text-center"></i>系統設定
          </button>
        </nav>
      </aside>

      <!-- 右側內容區 -->
      <main class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">

        <!-- ── 控制台 ── -->
        <div id="page-dashboard" class="page active space-y-6">
          <h2 class="text-sm font-bold text-white tracking-widest border-l-4 border-neoncyan pl-2">
            控制台 <span class="text-gray-500 font-sans font-normal text-xs ml-1">DASHBOARD</span>
          </h2>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="stats-row"></div>



        </div>

        <!-- ── 會員訂單管理 ── -->
        <div id="page-members-orders" class="page space-y-4">
          <div class="flex flex-wrap items-center justify-between gap-2">
            <h2 class="text-sm font-bold text-white tracking-widest border-l-4 border-neoncyan pl-2">
              會員訂單管理 <span class="text-gray-500 font-sans font-normal text-xs ml-1">MEMBERS &amp; ORDERS</span>
            </h2>
            <div class="flex items-center gap-2 text-[10px] text-gray-500 tracking-widest">
              <span class="w-2 h-2 rounded-full bg-green-400 shadow-[0_0_6px_rgba(74,222,128,0.8)] inline-block"></span>
              SYSTEM ONLINE
            </div>
          </div>
          <!-- Tab 切換 -->
          <div class="flex gap-1 border-b border-slate-700">
            <button id="tab-btn-orders" onclick="switchMoTab('orders')"
              class="px-5 py-2 text-xs font-bold tracking-widest text-neoncyan border-b-2 border-neoncyan transition">
              <i class="fa-solid fa-list-ul mr-1"></i>訂單列表
            </button>
            <button id="tab-btn-members" onclick="switchMoTab('members')"
              class="px-5 py-2 text-xs font-bold tracking-widest text-gray-500 border-b-2 border-transparent hover:text-white transition">
              <i class="fa-solid fa-users mr-1"></i>會員列表
            </button>
          </div>
          <!-- 訂單列表 tab -->
          <div id="mo-tab-orders" class="space-y-4">
            <div class="bg-panelbg border border-slate-700 tech-clip p-3 flex flex-col md:flex-row gap-2">
              <input id="search-input" type="text" placeholder="輸入手機、單號或姓名查詢..."
                class="flex-1 bg-darkbg border border-slate-600 text-white p-3 tech-clip text-sm focus:border-neoncyan transition"
                oninput="renderTable()">
              <select id="filter-status"
                class="bg-darkbg border border-slate-600 text-white p-3 tech-clip text-sm focus:border-neoncyan transition md:w-36"
                onchange="renderTable()">
                <option value="">全部狀態</option>
                <option>未付款</option><option>已付款</option><option>處理中</option>
                <option>已出貨</option><option>已完成</option><option>已取消</option>
              </select>
              <button onclick="exportJSON()"
                class="px-4 py-3 bg-slate-800 text-neoncyan font-bold tech-btn text-xs hover:bg-neoncyan hover:text-black transition whitespace-nowrap">
                <i class="fa-solid fa-download mr-1"></i>匯出
              </button>
            </div>
            <div id="orders-table"></div>
          </div>
          <!-- 會員列表 tab -->
          <div id="mo-tab-members" class="hidden space-y-4">
            <div id="member-list-view"></div>
            <div id="member-detail-view" class="hidden"></div>
          </div>
        </div>

        <!-- ── 商品管理 ── -->
        <div id="page-products" class="page space-y-4">
          <h2 class="text-sm font-bold text-white tracking-widest border-l-4 border-neoncyan pl-2">
            商品管理 <span class="text-gray-500 font-sans font-normal text-xs ml-1">PRODUCTS</span>
          </h2>
          <div id="prod-drill-view"></div>
        </div>

        <!-- ── 優惠券管理 ── -->
        <div id="page-coupons" class="page space-y-4">
          <h2 class="text-sm font-bold text-white tracking-widest border-l-4 border-neoncyan pl-2">
            優惠券管理 <span class="text-gray-500 font-sans font-normal text-xs ml-1">COUPONS</span>
          </h2>
          <div class="bg-panelbg border border-slate-700 tech-clip p-16 text-center">
            <i class="fa-solid fa-ticket text-4xl text-slate-700 mb-4 block"></i>
            <p class="text-gray-600 font-bold tracking-widest text-sm">目前尚無優惠券管理功能</p>
            <p class="text-gray-700 text-xs mt-1 tracking-widest">COMING SOON</p>
          </div>
        </div>

        <!-- ── 系統設定 ── -->
        <div id="page-settings" class="page space-y-4">
          <h2 class="text-sm font-bold text-white tracking-widest border-l-4 border-neoncyan pl-2">
            系統設定 <span class="text-gray-500 font-sans font-normal text-xs ml-1">SETTINGS</span>
          </h2>
          <div class="bg-panelbg border border-slate-700 tech-clip p-16 text-center">
            <i class="fa-solid fa-gear text-4xl text-slate-700 mb-4 block"></i>
            <p class="text-gray-600 font-bold tracking-widest text-sm">目前尚無系統設定</p>
            <p class="text-gray-700 text-xs mt-1 tracking-widest">COMING SOON</p>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-neoncyan text-black px-6 py-3 font-bold tech-btn z-[100] opacity-0 transition-opacity whitespace-nowrap shadow-2xl text-sm pointer-events-none"></div>

  <!-- Custom Confirm Dialog -->
  <div id="confirm-modal" class="hidden fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-6">
    <div class="bg-panelbg border border-neoncyan/50 tech-clip w-full max-w-xs shadow-[0_0_30px_rgba(0,243,255,0.15)] p-6 space-y-5">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-triangle-exclamation text-neonred text-lg shrink-0"></i>
        <p id="confirm-msg" class="text-sm font-bold text-white tracking-wide"></p>
      </div>
      <div class="flex justify-end gap-3">
        <button onclick="confirmCancel()"
          class="px-5 py-2 bg-slate-800 text-gray-400 font-bold tech-btn text-xs hover:bg-slate-600 hover:text-white transition">
          取消
        </button>
        <button onclick="confirmOk()"
          class="px-5 py-2 bg-neonred text-white font-bold tech-btn text-xs hover:bg-white hover:text-black transition">
          確定
        </button>
      </div>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════════════════════
    // 常數
    // ════════════════════════════════════════════════════════════
    const ADMIN_PASS  = '0909';
    const STATUS_LIST = ['未付款','已付款','處理中','已出貨','已完成','已取消'];
    const DEFAULT_PRODUCTS = [
      {id:1,name:'惡魔防摔殼 終極版',  price:890, cat:'case',  category:'case',  img:'fa-mobile-screen',   image:'',description:'',active:true},
      {id:2,name:'太空艙滿版保護貼',  price:450, cat:'case',  category:'case',  img:'fa-shield-halved',   image:'',description:'',active:true},
      {id:3,name:'螢幕總成維修',      price:0,   cat:'repair',category:'repair',img:'fa-screwdriver-wrench',image:'',description:'',active:true,tag:'現場報價'},
      {id:4,name:'電池檢測與更換',    price:0,   cat:'repair',category:'repair',img:'fa-battery-half',     image:'',description:'',active:true,tag:'現場報價'}
    ];

    let orders      = [];
    let currentPage = 'dashboard';

    // ════════════════════════════════════════════════════════════
    // 登入 / 登出
    // ════════════════════════════════════════════════════════════
    function doLogin() {
      // 密碼由 Firebase Auth 驗證，此函式由 _fbAdminLogin 呼叫
      if (typeof window._fbAdminLogin === 'function') {
        window._fbAdminLogin();
      } else {
        // Firebase 尚未載入時的 fallback（不應發生）
        _doShowAdmin();
      }
    }

    function _doShowAdmin() {
      document.getElementById('login-screen').classList.add('hidden');
      const main = document.getElementById('admin-main');
      main.classList.remove('hidden');
      main.classList.add('flex');
      loadOrders();
      renderProducts();
    }

    function doLogout() {
      if (typeof window._fbAdminSignOut === 'function') window._fbAdminSignOut();
      const main = document.getElementById('admin-main');
      main.classList.add('hidden');
      main.classList.remove('flex');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('admin-password').value = '';
      document.getElementById('login-error').classList.add('hidden');
    }

    // ════════════════════════════════════════════════════════════
    // 頁籤切換
    // ════════════════════════════════════════════════════════════
    function switchPage(page) {
      document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      const navD = document.getElementById('nav-' + page);
      const navM = document.getElementById('nav-m-' + page);
      if (navD) navD.classList.add('active');
      if (navM) navM.classList.add('active');
      currentPage = page;
      if (page === 'members-orders') { switchMoTab('orders'); }
      if (page === 'products') renderProducts();
    }

    function goToOrders(status = '') {
      switchPage('members-orders');
      const filter = document.getElementById('filter-status');
      if (filter) {
        filter.value = status;
      }
      renderTable();
    }

    // ════════════════════════════════════════════════════════════
    // 會員訂單管理 Tab 切換
    // ════════════════════════════════════════════════════════════
    let currentMoTab = 'orders';
    function switchMoTab(tab) {
      currentMoTab = tab;
      document.getElementById('mo-tab-orders').classList.toggle('hidden', tab !== 'orders');
      document.getElementById('mo-tab-members').classList.toggle('hidden', tab !== 'members');
      const btnO = document.getElementById('tab-btn-orders');
      const btnM = document.getElementById('tab-btn-members');
      if (btnO) {

    function getFiltered() {
      const kw = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
      const st =  document.getElementById('filter-status')?.value || '';
      return orders.filter(o => {
        const matchKw = !kw || o.id.toLowerCase().includes(kw) ||
          (o.items||[]).some(i => i.name.toLowerCase().includes(kw)) ||
          (o.customerName||'').toLowerCase().includes(kw) ||
          (o.customerPhone||'').includes(kw);
        const matchSt = !st || o.status === st;
        return matchKw && matchSt;
      });
    }

    // ════════════════════════════════════════════════════════════
    function applyStatus(orderId) {
      const sel   = document.getElementById('status-select-' + orderId);
      const order = orders.find(o => o.id === orderId);
      if (!sel || !order) return;
      order.status = sel.value;
      saveOrders(); renderStats(); renderTable();
      showToast('狀態已更新：' + order.status);
    }

    function markPaid(orderId) {
      const order = orders.find(o => o.id === orderId);
      if (!order) return;
      order.status = '已付款';
      saveOrders(); renderStats(); renderTable();
      showToast('已標記為已付款');
    }

    function copyOrder(orderId) {
      const order = orders.find(o => o.id === orderId);
      if (!order) return;
      const text = JSON.stringify(order, null, 2);
      navigator.clipboard.writeText(text)
        .then(() => showToast('已複製訂單資料'))
        .catch(() => {
          const el = document.createElement('textarea');
          el.value = text;
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          showToast('已複製訂單資料');
        });
    }

    function exportJSON() {
      const filtered = getFiltered();
      const blob = new Blob([JSON.stringify(filtered, null, 2)], { type:'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'apple911_orders_' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('已匯出 ' + filtered.length + ' 筆訂單');
    }

    function addProduct() {
      const name     = document.getElementById('prod-name').value.trim();
      const priceVal = document.getElementById('prod-price').value;
      const price    = parseInt(priceVal);
      const itemId   = parseInt(document.getElementById('prod-item').value) || 0;
      const brandId  = parseInt(document.getElementById('prod-brand').value) || 0;
      const seriesId = parseInt(document.getElementById('prod-series').value) || 0;
      const active   = document.getElementById('prod-active').value === 'true';
      const desc     = document.getElementById('prod-description').value.trim();
      const fileInput = document.getElementById('prod-image-file');

      if (!name)                     return showToast('請輸入商品名稱');
      if (isNaN(price) || price < 0) return showToast('請輸入正確價格');
      if (!itemId)                   return showToast('請選擇品項');
      if (!brandId)                  return showToast('請選擇品牌');

      const cats   = loadCategories();
      const item   = cats.find(c => c.id === itemId);
      const brand  = item ? (item.brands||[]).find(b => b.id === brandId) : null;
      const series = brand ? (brand.series||[]).find(s => s.id === seriesId) : null;
      const categoryName = [item?.name, brand?.name, series?.name].filter(Boolean).join(' / ');

      const doSave = (imageData) => {
        const prods = JSON.parse(localStorage.getItem('a911_products') || '[]');
        const newId = prods.length > 0 ? Math.max(...prods.map(p=>p.id)) + 1 : 1;
        prods.push({
          id: newId, name, price,
          category: item?.name||'', cat: item?.name||'',
          itemId, brandId, seriesId, categoryName,
          description: desc,
          image: imageData, img: 'fa-box',
          active,
          ...(price === 0 ? { tag:'現場報價' } : {})
        });
        saveProducts(prods);
        ['prod-name','prod-price','prod-description'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('prod-item').value   = '';
        document.getElementById('prod-brand').innerHTML  = '<option value="">請先選擇品項</option>';
        document.getElementById('prod-series').innerHTML = '<option value="">請先選擇品牌</option>';
        document.getElementById('prod-active').value = 'true';
        if (fileInput) fileInput.value = '';
        document.getElementById('prod-image-preview')?.classList.add('hidden');
        renderProducts();
        showToast('商品已新增：' + name);
      };

      const file = fileInput?.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => doSave(e.target.result);
        reader.readAsDataURL(file);
      } else {
        doSave('');
      }
    }

    function toggleProductActive(id) {
      const prods = loadProducts();
      const prod  = prods.find(p => p.id === id);
      if (!prod) return;
      prod.active = prod.active === false;
      saveProducts(prods);
      renderProdDrill();
      renderStats();
      showToast(prod.active ? '已上架：' + prod.name : '已下架：' + prod.name);
    }

        saveProducts(loadProducts().filter(p => p.id !== id));
        renderProdDrill();
        renderStats();
        showToast('商品已刪除');
      });
    }

    // ════════════════════════════════════════════════════════════
    // 商品鑽入式導覽（品項 → 品牌 → 系列 → 商品）
    // ════════════════════════════════════════════════════════════
    let prodPath = [];

    function prodNavTo(id) {
      const { items } = _getCatItems();
      const item = items.find(i => i.id === id);
      if (item) prodPath.push({ id, name: item.name });
      renderProdDrill();
    }
    function prodNavBack() { prodPath.pop(); renderProdDrill(); }
    function prodNavToLevel(level) { prodPath = prodPath.slice(0, level); renderProdDrill(); }

    function renderProdDrill() {
      const container = document.getElementById('prod-drill-view');
      if (!container) return;
      if (prodPath.length < 3) _renderCatLevel(container);
      else _renderProdLevel(container);
    }

    function _getCatItems() {
      const cats = loadCategories();
      if (prodPath.length === 0) return { cats, items: cats };
      if (prodPath.length === 1) { const p = cats.find(c => c.id === prodPath[0].id); return { cats, items: p ? (p.brands||[]) : [] }; }
      const p0 = cats.find(c => c.id === prodPath[0].id);
      const p1 = p0 ? p0.brands.find(b => b.id === prodPath[1].id) : null;
      return { cats, items: p1 ? (p1.series||[]) : [] };
    }

    function _crumbHtml() {
      const labels = ['所有品項', ...prodPath.map(p => p.name)];
      return labels.map((t, i) =>
        i < labels.length - 1
          ? `<span class="text-gray-600 cursor-pointer hover:text-gray-400 transition" onclick="prodNavToLevel(${i})">${t}</span><span class="text-gray-700 mx-1">›</span>`
          : `<span class="text-gray-300">${t}</span>`
      ).join('');
    }

    function _renderCatLevel(container) {
      const { cats, items } = _getCatItems();
      const level = prodPath.length;
      const levelNames = ['品項', '品牌', '系列'];

    function saveProdNewItem() {
      const input = document.getElementById('pdr-new-input');
      const name  = input?.value.trim();
      if (!name) return showToast('請輸入名稱');
      const { cats } = _getCatItems();
      const level = prodPath.length;
      const newId = Date.now();
      if (level === 0) cats.push({ id: newId, name, brands: [] });
      else if (level === 1) { const p = cats.find(c => c.id === prodPath[0].id); if (p) p.brands.push({ id: newId, name, series: [] }); }
      else { const p0 = cats.find(c => c.id === prodPath[0].id); const p1 = p0 ? p0.brands.find(b => b.id === prodPath[1].id) : null; if (p1) p1.series.push({ id: newId, name }); }
      saveCategories(cats);
      if (input) input.value = '';
      renderProdDrill();
      showToast('已新增：' + name);
    }

    function deleteProdItem(id) {
      showConfirm('確定刪除？', () => {
        const { cats } = _getCatItems();
        const level = prodPath.length;
        if (level === 0) { const idx = cats.findIndex(c => c.id === id); if (idx >= 0) cats.splice(idx, 1); }
        else if (level === 1) { const p = cats.find(c => c.id === prodPath[0].id); if (p) p.brands = p.brands.filter(b => b.id !== id); }
        else { const p0 = cats.find(c => c.id === prodPath[0].id); const p1 = p0 ? p0.brands.find(b => b.id === prodPath[1].id) : null; if (p1) p1.series = p1.series.filter(s => s.id !== id); }
        saveCategories(cats);
        renderProdDrill();
        showToast('已刪除');
      });
    }

    function startEditProdItem(id) {
      const label = document.getElementById('pdil-' + id);
      const { items } = _getCatItems();
      const item = items.find(i => i.id === id);
      if (!item || !label) return;
      label.innerHTML = `
        <div class="flex items-center gap-2">
          <input id="pdi-edit-${id}" type="text" value="${item.name.replace(/"/g,'&quot;')}"
            class="flex-1 min-w-0 bg-darkbg border border-neoncyan text-white p-2 tech-clip text-xs focus:border-neoncyan transition"
            onkeydown="if(event.key==='Enter')saveEditProdItem(${id});if(event.key==='Escape')renderProdDrill()">
          <button onclick="saveEditProdItem(${id})" class="text-xs px-3 py-1 bg-neoncyan text-black font-bold tech-btn hover:bg-white transition">儲存</button>
          <button onclick="renderProdDrill()" class="text-xs px-2 py-1 bg-slate-700 text-gray-400 font-bold tech-btn hover:text-white transition">取消</button>
        </div>`;
      document.getElementById('pdi-edit-' + id)?.focus();
    }

    function saveEditProdItem(id) {
      const name = document.getElementById('pdi-edit-' + id)?.value.trim();
      if (!name) return showToast('名稱不可為空');
      const { cats, items } = _getCatItems();
      const item = items.find(i => i.id === id);
      if (item) item.name = name;
      saveCategories(cats);
      renderProdDrill();
      showToast('已儲存');
    }

    function addProductFromPath() {
      const name  = document.getElementById('prod-name')?.value.trim();
      const price = parseInt(document.getElementById('prod-price')?.value);
      const active = document.getElementById('prod-active')?.value === 'true';
      const desc  = document.getElementById('prod-description')?.value.trim() || '';
      const fileInput = document.getElementById('prod-image-file');
      if (!name) return showToast('請輸入商品名稱');
      if (isNaN(price) || price < 0) return showToast('請輸入正確價格');
      const cats   = loadCategories();
      const item   = cats.find(c => c.id === prodPath[0].id);
      const brand  = item ? (item.brands||[]).find(b => b.id === prodPath[1].id) : null;
      const series = brand ? (brand.series||[]).find(s => s.id === prodPath[2].id) : null;
      const categoryName = [item?.name, brand?.name, series?.name].filter(Boolean).join(' / ');
      const doSave = (imageData) => {
        const prods = JSON.parse(localStorage.getItem('a911_products') || '[]');
        const newId = prods.length > 0 ? Math.max(...prods.map(p=>p.id)) + 1 : 1;
        prods.push({ id: newId, name, price, category: item?.name||'', cat: item?.name||'',
          itemId: prodPath[0].id, brandId: prodPath[1].id, seriesId: prodPath[2].id,
          categoryName, description: desc, image: imageData, img: 'fa-box', active,
          ...(price === 0 ? { tag:'現場報價' } : {}) });
        saveProducts(prods);
        document.getElementById('prod-name').value = '';
        document.getElementById('prod-price').value = '';
        document.getElementById('prod-description').value = '';
        document.getElementById('prod-active').value = 'true';
        if (fileInput) fileInput.value = '';
        document.getElementById('prod-image-preview')?.classList.add('hidden');
        document.getElementById('pdr-add-form')?.classList.add('hidden');
        renderProdDrill();
        showToast('商品已新增：' + name);
      };
      const file = fileInput?.files[0];
      if (file) { const reader = new FileReader(); reader.onload = e => doSave(e.target.result); reader.readAsDataURL(file); }
      else doSave('');
    }

    // ════════════════════════════════════════════════════════════
    // 分類管理（品項 → 品牌 → 系列）— 保留供 legacy 相容
    // ════════════════════════════════════════════════════════════
    const DEFAULT_CATEGORIES = [
      { id:1, name:'手機殼', brands:[{ id:101, name:'Apple', series:[
        { id:1001, name:'iPhone 16系列' },
        { id:1002, name:'iPhone 15系列' },
        { id:1003, name:'iPhone 14系列' }
      ]}] },
      { id:2, name:'維修服務', brands:[] },
      { id:3, name:'保護貼', brands:[] }
    ];

    let catPath = [];

    function loadCategories() {
      const s = JSON.parse(localStorage.getItem('a911_categories') || 'null');
      return (s && s.length > 0) ? s : JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
    }
    function saveCategories(cats) {
      localStorage.setItem('a911_categories', JSON.stringify(cats));
      if (window._fbSaveCategories) window._fbSaveCategories(cats);
    }

    function showCatMgmt() {
      catPath = [];
      document.getElementById('prod-list').classList.add('hidden');
      document.getElementById('prod-add-form').classList.add('hidden');
      document.getElementById('cat-mgmt-view').classList.remove('hidden');
      renderCatMgmt();
    }
    function hideCatMgmt() {
      document.getElementById('prod-list').classList.remove('hidden');
      document.getElementById('cat-mgmt-view').classList.add('hidden');
      catPath = [];
    }
    function catNavTo(id) {
      const { items } = getCatContext();
      const item = items.find(i => i.id === id);
      if (item) { catPath.push({ id, name: item.name }); renderCatMgmt(); }
    }
    function catNavBack() { catPath.pop(); renderCatMgmt(); }

    function getCatContext() {
      const cats = loadCategories();
      if (catPath.length === 0) return { cats, items: cats, level: 0 };
      if (catPath.length === 1) {
        const p = cats.find(c => c.id === catPath[0].id);
        return { cats, items: p ? (p.brands || []) : [], level: 1 };
      }
      const p0 = cats.find(c => c.id === catPath[0].id);
      const p1 = p0 ? (p0.brands || []).find(b => b.id === catPath[1].id) : null;
      return { cats, items: p1 ? (p1.series || []) : [], level: 2 };
    }

    function renderCatMgmt() {
      const view = document.getElementById('cat-mgmt-view');
      const { items, level } = getCatContext();
      const levelNames = ['品項', '品牌', '系列'];
      const levelName  = levelNames[level];
      const nextLabels = ['品牌管理', '系列管理', ''];
      const nextLabel  = nextLabels[level];
      const crumbHtml  = ['品項管理', ...catPath.map(p => p.name)]
        .map((t, i) => i === 0
          ? `<span class="text-gray-400 font-bold">${t}</span>`
          : `<span class="text-gray-600">›</span><span class="text-white">${t}</span>`)
        .join(' ');

      const itemsHtml = items.map(item => `
        <div class="bg-darkbg border border-slate-700 tech-clip p-3 flex items-center gap-2" id="cat-item-${item.id}">
          <div class="flex-1 min-w-0" id="cat-label-${item.id}">
            <span class="text-sm font-bold text-white">${item.name}</span>
          </div>
          <div class="flex items-center gap-2 shrink-0 flex-wrap justify-end">
            ${level < 2 ? `<button onclick="catNavTo(${item.id})"
              class="text-xs px-3 py-1 bg-slate-800 text-neoncyan font-bold tech-btn hover:bg-neoncyan hover:text-black transition whitespace-nowrap">
              ${nextLabel}
            </button>` : ''}
            <button onclick="startEditCat(${item.id})"
              class="text-xs px-3 py-1 bg-slate-800 text-gray-400 font-bold tech-btn hover:bg-slate-600 hover:text-white transition">
              編輯
            </button>
            <button onclick="deleteCat(${item.id})" class="text-slate-600 hover:text-neonred transition px-2">
              <i class="fa-solid fa-trash-can text-sm"></i>
            </button>
          </div>
        </div>`).join('');

      view.innerHTML = `
        <div class="flex items-center gap-2 flex-wrap">
          <button onclick="hideCatMgmt()"
            class="text-xs px-3 py-2 bg-slate-800 text-gray-400 font-bold tech-btn hover:bg-slate-600 hover:text-white transition">
            <i class="fa-solid fa-arrow-left mr-1"></i>回商品列表
          </button>
          ${level > 0 ? `<button onclick="catNavBack()"
            class="text-xs px-3 py-2 bg-slate-800 text-gray-400 font-bold tech-btn hover:bg-slate-600 hover:text-white transition">
            <i class="fa-solid fa-chevron-left mr-1"></i>上一層
          </button>` : ''}
        </div>
        <div class="flex items-center gap-2 text-xs tracking-widest flex-wrap">${crumbHtml}</div>
        <div class="bg-panelbg border border-slate-700 tech-clip p-4 space-y-2">
          <p class="text-xs font-bold text-neoncyan tracking-widest mb-3">${levelName}列表</p>
          <div class="space-y-2">
            ${itemsHtml || `<p class="text-xs text-gray-600 text-center py-6 tracking-widest">尚無${levelName}</p>`}
          </div>
          <div class="flex gap-2 pt-3 border-t border-slate-800">
            <input id="cat-new-name" type="text" placeholder="輸入${levelName}名稱"
              class="flex-1 bg-darkbg border border-slate-600 text-white p-2 tech-clip text-xs focus:border-neoncyan transition"
              onkeydown="if(event.key==='Enter')addCatItem()">
            <button onclick="addCatItem()"
              class="px-4 py-2 bg-neoncyan text-black font-bold tech-btn text-xs hover:bg-white transition whitespace-nowrap">
              <i class="fa-solid fa-plus mr-1"></i>新增
            </button>
          </div>
        </div>`;
    }

    function addCatItem() {
      const input = document.getElementById('cat-new-name');
      const name  = input.value.trim();
      if (!name) return showToast('請輸入名稱');
      const { cats, level } = getCatContext();
      const newId = Date.now();
      if (level === 0) {
        cats.push({ id: newId, name, brands: [] });
      } else if (level === 1) {
        const p = cats.find(c => c.id === catPath[0].id);
        if (p) p.brands.push({ id: newId, name, series: [] });
      } else {
        const p0 = cats.find(c => c.id === catPath[0].id);
        const p1 = p0 ? p0.brands.find(b => b.id === catPath[1].id) : null;
        if (p1) p1.series.push({ id: newId, name });
      }
      saveCategories(cats);
      input.value = '';
      renderCatMgmt();
      showToast('已新增：' + name);
    }

    function deleteCat(id) {
      showConfirm('確定刪除？', () => {
        const { cats, level } = getCatContext();
        if (level === 0) {
          const idx = cats.findIndex(c => c.id === id);
          if (idx >= 0) cats.splice(idx, 1);
        } else if (level === 1) {
          const p = cats.find(c => c.id === catPath[0].id);
          if (p) p.brands = p.brands.filter(b => b.id !== id);
        } else {
          const p0 = cats.find(c => c.id === catPath[0].id);
          const p1 = p0 ? p0.brands.find(b => b.id === catPath[1].id) : null;
          if (p1) p1.series = p1.series.filter(s => s.id !== id);
        }
        saveCategories(cats);
        renderCatMgmt();
        showToast('已刪除');
      });
    }

    function startEditCat(id) {
      const label = document.getElementById('cat-label-' + id);
      const { items } = getCatContext();
      const item = items.find(i => i.id === id);
      if (!item || !label) return;
      label.innerHTML = `
        <div class="flex items-center gap-2 flex-wrap">
          <input id="cat-edit-${id}" type="text" value="${item.name.replace(/"/g,'&quot;')}"
            class="bg-darkbg border border-neoncyan text-white p-2 tech-clip text-xs focus:border-neoncyan transition w-40"
            onkeydown="if(event.key==='Enter')saveCatItem(${id});if(event.key==='Escape')renderCatMgmt()">
          <button onclick="saveCatItem(${id})"
            class="text-xs px-3 py-1 bg-neoncyan text-black font-bold tech-btn hover:bg-white transition">儲存</button>
          <button onclick="renderCatMgmt()"
            class="text-xs px-2 py-1 bg-slate-700 text-gray-400 font-bold tech-btn hover:text-white transition">取消</button>
        </div>`;
      document.getElementById('cat-edit-' + id)?.focus();
    }

    function saveCatItem(id) {
      const name = document.getElementById('cat-edit-' + id)?.value.trim();
      if (!name) return showToast('名稱不可為空');
      const { cats, items, level } = getCatContext();
      let item;
      if (level === 0) item = cats.find(c => c.id === id);
      else if (level === 1) { const p = cats.find(c => c.id === catPath[0].id); item = p?.brands.find(b => b.id === id); }
      else { const p0 = cats.find(c => c.id === catPath[0].id); const p1 = p0?.brands.find(b => b.id === catPath[1].id); item = p1?.series.find(s => s.id === id); }
      if (item) item.name = name;
      saveCategories(cats);
      renderCatMgmt();
      showToast('已儲存');
    }

    // ════════════════════════════════════════════════════════════
    // Custom Confirm
    // ════════════════════════════════════════════════════════════
    let _confirmCb = null;
    function showConfirm(msg, cb) {
      document.getElementById('confirm-msg').textContent = msg;
      document.getElementById('confirm-modal').classList.remove('hidden');
      _confirmCb = cb;
    }
    function confirmOk() {
      document.getElementById('confirm-modal').classList.add('hidden');
      if (_confirmCb) { _confirmCb(); _confirmCb = null; }
    }
    function confirmCancel() {
      document.getElementById('confirm-modal').classList.add('hidden');
      _confirmCb = null;
    }

    // ════════════════════════════════════════════════════════════
    // 會員列表
    // ════════════════════════════════════════════════════════════
    function renderMembers() {
      const listView   = document.getElementById('member-list-view');
      const detailView = document.getElementById('member-detail-view');
      if (!listView) return;
      listView.classList.remove('hidden');
      detailView.classList.add('hidden');

      const members = JSON.parse(localStorage.getItem('a911_members') || '[]');
      if (members.length === 0) {
        listView.innerHTML = `<div class="bg-panelbg border border-slate-700 tech-clip p-16 text-center">
          <i class="fa-solid fa-users text-4xl text-slate-700 mb-4 block"></i>
          <p class="text-gray-600 font-bold tracking-widest text-sm">目前尚無會員資料</p>
          <p class="text-gray-700 text-xs mt-1 tracking-widest">NO MEMBERS YET</p>
        </div>`;
        return;
      }

      const rowsHtml = members.map(m => {
        const memberOrders = orders.filter(o =>
          o.customerPhone === m.phone || o.customerEmail === m.email
        );
        const totalSpend = memberOrders
          .filter(o => o.status !== '已取消')
          .reduce((s, o) => s + (o.total || 0), 0);
        const modelText = m.device || m.model || '';
        return `
        <div class="bg-panelbg border border-slate-700 tech-clip p-4 hover:border-neoncyan transition cursor-pointer"
          onclick="showMemberDetail('${m.id || m.phone}')">
          <div class="flex items-start gap-4">
            <div class="w-14 h-14 rounded-xl bg-neoncyan/10 border border-neoncyan/25 flex items-center justify-center shrink-0">
              <i class="fa-solid fa-user text-neoncyan text-xl"></i>
            </div>
            <div class="flex-1 min-w-0 space-y-2">
              <div class="flex flex-wrap items-center gap-2">
                <p class="text-white text-lg font-bold truncate">${m.name || '-'}</p>
                ${m.gender ? `<span class="text-[10px] uppercase tracking-widest text-gray-400">${m.gender}</span>` : ''}
              </div>
              <div class="flex flex-wrap gap-3 items-center text-xs">
                <span class="text-neoncyan font-tech">${m.phone || '-'}</span>
                ${m.email ? `<span class="text-gray-400">${m.email}</span>` : ''}
              </div>
              <div class="grid grid-cols-2 gap-3 text-[10px] text-gray-500">
                ${m.birthday ? `<span>生日：<span class="text-gray-300">${m.birthday}</span></span>` : ''}
                ${modelText ? `<span>型號：<span class="text-gray-300">${modelText}</span></span>` : ''}
                ${m.line ? `<span>LINE：<span class="text-gray-300">${m.line}</span></span>` : ''}
                ${m.address ? `<span>地址：<span class="text-gray-300 break-all">${m.address}</span></span>` : ''}
              </div>
            </div>
            <div class="shrink-0 text-right">
              <p class="text-goldlight font-tech font-bold text-sm">NT$ ${totalSpend.toLocaleString()}</p>
              <p class="text-gray-600 text-[10px] mt-0.5">${memberOrders.length} 筆</p>
            </div>
          </div>
        </div>`;
      }).join('');

      listView.innerHTML = `
        <div class="space-y-3">
          ${rowsHtml}
        </div>
        <p class="text-xs text-gray-600 px-1">共 ${members.length} 位會員</p>`;
    }

    function showMemberDetail(memberId) {
      const listView   = document.getElementById('member-list-view');
      const detailView = document.getElementById('member-detail-view');
      if (!listView || !detailView) return;

      const members = JSON.parse(localStorage.getItem('a911_members') || '[]');
      const m = members.find(x => (x.id || x.phone) === memberId);
      if (!m) return;

      listView.classList.add('hidden');
      detailView.classList.remove('hidden');

      const memberOrders = orders.filter(o =>
        o.customerPhone === m.phone || o.customerEmail === m.email
      );
      const totalSpend = memberOrders
        .filter(o => o.status !== '已取消')
        .reduce((s, o) => s + (o.total || 0), 0);

      const ordersHtml = memberOrders.length === 0
        ? '<p class="text-xs text-gray-600 text-center py-6 tracking-widest">尚無訂單記錄</p>'
        : memberOrders.map(order => {
            const optHtml = STATUS_LIST.map(s =>
              `<option value="${s}" ${order.status===s?'selected':''}>${s}</option>`).join('');
            return `
            <div class="border-b border-slate-800 last:border-0 px-4 py-3 space-y-2">
              <div class="flex items-center justify-between gap-2 flex-wrap">
                <div>
                  <p class="text-xs text-gray-300">${(order.items||[]).map(i=>i.name).join('、')||'-'}</p>
                  <p class="text-[10px] text-gray-600 font-tech tracking-widest mt-0.5">${order.id} · ${order.time||'-'}</p>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                  <span class="text-goldlight font-tech font-bold text-sm">NT$ ${order.total}</span>
                  <span class="status-badge badge-${order.status}">${order.status}</span>
                </div>
              </div>
              <div class="flex flex-wrap gap-2 items-center">
                <select id="md-status-${order.id}" onclick="event.stopPropagation()"
                  class="bg-darkbg border border-slate-600 text-white p-2 tech-clip text-xs focus:border-neoncyan transition flex-1 min-w-[120px]">
                  ${optHtml}
                </select>
                <button onclick="applyStatusFromDetail('${order.id}','${memberId}')"
                  class="px-4 py-2 bg-slate-800 text-neoncyan font-bold tech-btn text-xs hover:bg-neoncyan hover:text-black transition whitespace-nowrap">
                  套用狀態
                </button>
              </div>
            </div>`;
          }).join('');

      detailView.innerHTML = `
        <button onclick="renderMembers()"
          class="text-xs px-3 py-2 bg-slate-800 text-gray-400 font-bold tech-btn hover:bg-slate-600 hover:text-white transition">
          <i class="fa-solid fa-chevron-left mr-1"></i>回會員列表
        </button>
        <div class="bg-panelbg border border-slate-700 tech-clip p-5 space-y-3">
          <p class="text-xs font-bold text-neoncyan tracking-widest border-b border-slate-700 pb-2">會員資料</p>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-3 text-xs">
            <div><p class="text-gray-600 uppercase tracking-widest font-bold mb-1 text-[10px]">姓名</p><p class="text-white">${m.name||'-'}</p></div>
            <div><p class="text-gray-600 uppercase tracking-widest font-bold mb-1 text-[10px]">手機</p><p class="text-neoncyan font-tech">${m.phone||'-'}</p></div>
            <div><p class="text-gray-600 uppercase tracking-widest font-bold mb-1 text-[10px]">信箱</p><p class="text-gray-300 break-all">${m.email||'-'}</p></div>
            <div><p class="text-gray-600 uppercase tracking-widest font-bold mb-1 text-[10px]">生日</p><p class="text-gray-300">${m.birthday||'-'}</p></div>
            <div><p class="text-gray-600 uppercase tracking-widest font-bold mb-1 text-[10px]">地址</p><p class="text-gray-300">${m.address||'-'}</p></div>
            <div><p class="text-gray-600 uppercase tracking-widest font-bold mb-1 text-[10px]">總消費</p><p class="text-goldlight font-tech font-bold">NT$ ${totalSpend.toLocaleString()}</p></div>
            <div><p class="text-gray-600 uppercase tracking-widest font-bold mb-1 text-[10px]">註冊時間</p><p class="text-gray-300">${(m.registeredAt || m.createdAt) ? new Date(m.registeredAt || m.createdAt).toLocaleDateString('zh-TW') : '-'}</p></div>
          </div>
        </div>
        <div class="bg-panelbg border border-slate-700 tech-clip overflow-hidden">
          <div class="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
            <p class="text-xs font-bold text-neoncyan tracking-widest">訂單記錄</p>
            <span class="text-[10px] text-gray-600">${memberOrders.length} 筆</span>
          </div>
          ${ordersHtml}
        </div>`;
    }

    function applyStatusFromDetail(orderId, memberId) {
      const sel   = document.getElementById('md-status-' + orderId);
      const order = orders.find(o => o.id === orderId);
      if (!sel || !order) return;
      order.status = sel.value;
      saveOrders(); renderStats();
      showMemberDetail(memberId);
      showToast('狀態已更新：' + order.status);
    }

    // ════════════════════════════════════════════════════════════
    // Toast
    // ════════════════════════════════════════════════════════════
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.opacity = '1';
      setTimeout(() => t.style.opacity = '0', 2200);
    }

    // ════════════════════════════════════════════════════════════
    // 初始化
    // ════════════════════════════════════════════════════════════
    document.getElementById('admin-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('admin-pass-field').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const _fbCfg = {
  apiKey: "AIzaSyDpasiFnj0UQpNKndmya4__C1J8bJxGN4g",
  authDomain: "apple911-shop.firebaseapp.com",
  projectId: "apple911-shop",
  storageBucket: "apple911-shop.firebasestorage.app",
  messagingSenderId: "335224055176",
  appId: "1:335224055176:web:62f37cdf81f6233c16063d"
};
const _fbApp      = initializeApp(_fbCfg);
const _fbDb       = getFirestore(_fbApp);
const _fbAuth     = getAuth(_fbApp);
const _fbProdsRef    = doc(_fbDb, 'store', 'products');
const _fbOrdRef      = doc(_fbDb, 'store', 'orders');
const _fbCatRef      = doc(_fbDb, 'store', 'categories');
const _fbMembersRef  = doc(_fbDb, 'store', 'members');

// ── 後台管理員 Email 登入 ──
window._fbAdminLogin = async function() {
  const email    = document.getElementById('admin-password').value.trim(); // 欄位重用為 email
  // 若欄位輸入含 @ 視為 email+密碼模式；否則顯示提示
  // 實際上後台登入欄位需分成 email + password，見下方說明
  const passEl   = document.getElementById('admin-pass-field');
  const password = passEl ? passEl.value : email;
  const emailVal = passEl ? email : null;

  if (!emailVal || !password) {
    document.getElementById('login-error').classList.remove('hidden');
    document.getElementById('login-error').textContent = '請輸入帳號與密碼';
    return;
  }
  try {
    await signInWithEmailAndPassword(_fbAuth, emailVal, password);
    // 登入成功由 onAuthStateChanged 處理
  } catch(e) {
    document.getElementById('login-error').classList.remove('hidden');
    document.getElementById('login-error').textContent =
      e.code === 'auth/invalid-credential' ? '帳號或密碼錯誤，請重試' :
      e.code === 'auth/invalid-email'       ? '請輸入有效的信箱'       : '登入失敗，請稍後再試';
    console.error('[Firebase Auth] 後台登入失敗:', e.code);
  }
};

// ── 登出 ──
window._fbAdminSignOut = async function() {
  try { await signOut(_fbAuth); } catch(e) {}
};

// ── Auth 狀態監聽 ──
onAuthStateChanged(_fbAuth, (user) => {
  if (user) {
    console.log('[Firebase Auth] 後台已登入:', user.email);
    if (typeof _doShowAdmin === 'function') _doShowAdmin();
  } else {
    console.log('[Firebase Auth] 後台未登入');
  }
});

window._fbSaveProducts = async function(prods) {
  try {
    await setDoc(_fbProdsRef, { list: prods, updatedAt: Date.now() });
    console.log('[Firebase] 商品儲存成功，共', prods.length, '筆');
  } catch(e) { console.error('[Firebase] 商品儲存失敗:', e.message); }
};

window._fbSaveOrders = async function(list) {
  try {
    await setDoc(_fbOrdRef, { list, updatedAt: Date.now() });
    console.log('[Firebase] 訂單儲存成功，共', list.length, '筆');
  } catch(e) { console.error('[Firebase] 訂單儲存失敗:', e.message); }
};

window._fbSaveCategories = async function(cats) {
  try {
    await setDoc(_fbCatRef, { list: cats, updatedAt: Date.now() });
    console.log('[Firebase] 分類儲存成功');
  } catch(e) { console.error('[Firebase] 分類儲存失敗:', e.message); }
};

(async function() {
  try {
    const ps = await getDoc(_fbProdsRef);
    if (ps.exists()) {
      const prods = ps.data().list || [];
      if (prods.length > 0) {
        localStorage.setItem('a911_products', JSON.stringify(prods));
        if (typeof renderStats     === 'function') renderStats();
        if (typeof renderProdDrill === 'function') renderProdDrill();
        if (typeof _dbgAdminRun    === 'function') _dbgAdminRun();
      }
    }
    const os = await getDoc(_fbOrdRef);
    if (os.exists()) {
      const list = os.data().list || [];
      localStorage.setItem('apple911_orders', JSON.stringify(list));
      if (typeof loadOrders === 'function') loadOrders();
    }
    const cs = await getDoc(_fbCatRef);
    if (cs.exists()) {
      const cats = cs.data().list || [];
      if (cats.length > 0) localStorage.setItem('a911_categories', JSON.stringify(cats));
    }
    const ms = await getDoc(_fbMembersRef);
    if (ms.exists()) {
      const mlist = ms.data().list || [];
      if (mlist.length > 0) localStorage.setItem('a911_members', JSON.stringify(mlist));
    }
    console.log('[Firebase] 後台初始同步完成');
  } catch(e) { console.error('[Firebase] 後台初始同步失敗:', e.message); }
})();
</script>
<!-- Firebase 整合 END -->

</body>
