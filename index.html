<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple 911 | 科技配件與專業維修</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Noto Sans TC', 'sans-serif'], tech: ['Rajdhani', 'sans-serif'], esport: ['Orbitron', 'sans-serif'] },
          colors: { darkbg: '#050505', panelbg: '#0a0f18', neoncyan: '#00f3ff', neonred: '#ff003c', goldlight: '#e2c78e', golddark: '#b38539' }
        }
      }
    }
  </script>
  <style>
    body { background-color:#050505; background-image:radial-gradient(rgba(0,243,255,.05) 1px,transparent 1px); background-size:30px 30px; color:#e2e8f0; min-height:100vh; display:flex; flex-direction:column; }
    .text-gold-gradient{background:linear-gradient(135deg,#e2c78e 0%,#b38539 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .tech-clip{clip-path:polygon(15px 0,100% 0,100% calc(100% - 15px),calc(100% - 15px) 100%,0 100%,0 15px);}
    .tech-btn{clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);transition:all .2s;}
    .tech-btn:active{transform:scale(.95);}
    .drawer-transition{transition:transform .3s ease;}.cart-drawer{transform:translateX(100%);}.cart-drawer.open{transform:translateX(0);}.menu-drawer{transform:translateX(-100%);}.menu-drawer.open{transform:translateX(0);}
    .submenu{max-height:0;overflow:hidden;transition:max-height .3s ease;}.submenu.open{max-height:400px;}.menu-arrow{transition:transform .3s ease;}.menu-arrow.open{transform:rotate(180deg);}
    .overlay{opacity:0;pointer-events:none;transition:opacity .3s ease;backdrop-filter:blur(5px);}.overlay.open{opacity:1;pointer-events:auto;}
    .member-tab-active{color:#00f3ff!important;border-bottom:2px solid #00f3ff!important;text-shadow:0 0 10px rgba(0,243,255,.5);}
    .en-sub{font-size:.75em;opacity:.7;font-family:'Rajdhani';letter-spacing:.05em;text-transform:uppercase;}
    .fab-menu{transform:translateY(20px);opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.175,.885,.32,1.275);}.fab-menu.open{transform:translateY(0);opacity:1;pointer-events:auto;}.fab-main-icon{transition:transform .3s ease;}.fab-main-icon.open{transform:rotate(45deg);}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#00f3ff;border-radius:4px;}.custom-scrollbar::-webkit-scrollbar{width:4px;}.custom-scrollbar::-webkit-scrollbar-thumb{background:#00f3ff;border-radius:10px;}
    input,select,textarea{font-size:16px!important;}
    /* 取貨方式卡片 */
    @keyframes neon-pulse{
      0%,100%{box-shadow:0 0 6px rgba(0,243,255,0.4),0 0 18px rgba(0,243,255,0.15),inset 0 0 8px rgba(0,243,255,0.05);}
      50%{box-shadow:0 0 14px rgba(0,243,255,0.75),0 0 32px rgba(0,243,255,0.3),inset 0 0 14px rgba(0,243,255,0.1);}
    }
    @keyframes icon-glow-pulse{
      0%,100%{filter:drop-shadow(0 0 4px rgba(0,243,255,0.6));}
      50%{filter:drop-shadow(0 0 10px rgba(0,243,255,1)) drop-shadow(0 0 20px rgba(0,243,255,0.5));}
    }
    .ship-card{
      min-height:120px;
      position:relative;
      border:1px solid rgba(100,116,139,0.4);
      background:linear-gradient(160deg,#0d1420 0%,#060b12 100%);
      border-radius:6px;
      transition:transform .2s cubic-bezier(.34,1.56,.64,1), border-color .2s, box-shadow .2s;
      cursor:pointer;
    }
    .ship-card:hover{
      transform:translateY(-3px);
      border-color:rgba(0,243,255,0.35);
      box-shadow:0 6px 20px rgba(0,243,255,0.1);
    }
    .ship-card:hover .ship-card-icon{
      filter:drop-shadow(0 0 6px rgba(0,243,255,0.5));
      color:#7af8ff!important;
    }
    .ship-card.selected{
      border-color:#00f3ff!important;
      background:linear-gradient(160deg,#071a1f 0%,#040d12 100%)!important;
      transform:scale(1.03);
      animation:neon-pulse 1.8s ease-in-out infinite;
    }
    .ship-card.selected .ship-card-icon{
      color:#00f3ff!important;
      animation:icon-glow-pulse 1.8s ease-in-out infinite;
    }
    .ship-card.selected .ship-card-title{color:#e2e8f0!important;}
    .ship-card.selected .ship-card-sub{color:#00f3ff!important;opacity:0.85;}
    .ship-card.selected .ship-card-fee{color:#00f3ff!important;opacity:0.9;}
    /* LINE Pay 用圖片，選中 / hover 時不套用 neoncyan icon 動畫 */
    #pay-card-linepay .pay-card-icon{ filter:none!important; animation:none!important; }
    #pay-card-linepay.selected .pay-card-icon{ filter:drop-shadow(0 0 6px rgba(6,199,85,0.5))!important; animation:none!important; }
    .ship-card-icon{color:#4a6270;font-size:1.75rem;transition:color .2s,filter .2s;}
    .ship-card-title{font-size:.8rem;font-weight:700;color:#cbd5e1;letter-spacing:.04em;transition:color .2s;}
    .ship-card-sub{font-size:.65rem;color:#475569;transition:color .2s;}
    .ship-card-fee{font-size:.65rem;color:#64748b;letter-spacing:.03em;transition:color .2s;}
  </style>
</head>
<body class="font-sans antialiased relative">
  <nav class="sticky top-0 z-40 bg-panelbg/90 backdrop-blur-md border-b-2 border-neoncyan/50 shadow-[0_0_15px_rgba(0,243,255,0.2)]">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <button onclick="toggleMenu()" class="p-2 text-neoncyan hover:text-white transition duration-300"><i class="fa-solid fa-bars text-2xl drop-shadow-[0_0_8px_#00f3ff]"></i></button>
        <div class="font-esport text-2xl font-black tracking-widest text-white flex items-center cursor-pointer" onclick="showSection('home')">APPLE<span class="text-gold-gradient ml-1">911</span></div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="handleUserClick()" class="p-2 text-neoncyan hover:text-white transition duration-300 relative"><i class="fa-solid fa-user text-xl"></i><span id="user-status-dot" class="absolute top-2 right-2 w-2 h-2 bg-slate-600 rounded-full"></span></button>
        <button onclick="toggleCart()" class="relative p-2 text-neoncyan hover:text-white transition duration-300"><i class="fa-solid fa-cart-shopping text-xl"></i><span id="cart-count" class="absolute -top-1 -right-1 bg-neonred text-white text-[10px] font-bold rounded-sm w-5 h-5 flex items-center justify-center scale-0 transition-transform font-esport tech-btn">0</span></button>
      </div>
    </div>
  </nav>

  <div class="menu-drawer drawer-transition bg-panelbg border-r border-neoncyan fixed inset-y-0 left-0 w-[85vw] md:w-[350px] shadow-[10px_0_30px_rgba(0,243,255,0.1)] z-[60] flex flex-col">
    <div class="p-5 border-b border-neoncyan/30 flex justify-between items-center bg-darkbg"><h2 class="text-lg font-bold text-white tracking-widest uppercase">探索商品 <span class="en-sub block mt-1">EXPLORE PRODUCTS</span></h2><button onclick="toggleMenu()" class="text-neoncyan"><i class="fa-solid fa-xmark text-2xl"></i></button></div>
    <div class="flex-grow overflow-y-auto p-4 space-y-3">
      <button onclick="applyFilter('all')" class="w-full text-left p-4 bg-darkbg border border-neoncyan text-neoncyan font-bold tech-clip transition uppercase hover:bg-white/5"><i class="fa-solid fa-globe mr-2"></i>全部商品與維修 <span class="en-sub block mt-1">ALL ASSETS & REPAIR</span></button>
      <div id="front-cat-list"></div>
    </div>
  </div>

  <!-- 跑馬燈 -->
  <div id="marquee-bar" class="hidden overflow-hidden bg-neoncyan/5 border-b border-neoncyan/20 py-1.5">
    <div id="marquee-track" class="flex whitespace-nowrap text-xs text-neoncyan font-bold tracking-widest" style="animation:marquee-scroll 25s linear infinite;width:max-content"></div>
  </div>
  <style>@keyframes marquee-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}</style>

  <header class="relative py-8 text-center border-b border-neoncyan/30 flex-shrink-0"><h1 class="text-3xl font-black mb-2 text-white uppercase font-esport">APPLE<span class="text-gold-gradient">911</span></h1><p class="text-neoncyan font-bold tracking-widest text-sm">配件怪獸 X 專業維修</p><p class="en-sub text-neoncyan mt-1">ASSETS MONSTER & PROFESSIONAL REPAIR</p></header>

  <main class="flex-grow flex flex-col max-w-7xl mx-auto w-full pb-20">
    <div id="home-view" class="px-4 py-8">
    <!-- 首頁公告 -->
    <div id="announcement-bar" class="hidden mb-4 px-4 py-3 rounded flex items-center gap-2 text-xs font-bold">
      <i id="announcement-icon" class="fa-solid fa-circle-info shrink-0"></i><span id="announcement-text"></span>
    </div>
    <h2 class="text-sm font-bold flex items-center text-white tracking-widest border-l-4 border-neoncyan pl-2 mb-4">服務選單 <span class="en-sub ml-2">SELECT SERVICE</span></h2>
    <div class="grid grid-cols-2 gap-4" id="home-cat-grid"></div></div>
    <div id="product-view" class="px-4 py-8 hidden"><div class="flex justify-between items-end mb-6 border-b border-slate-800 pb-2"><h2 class="text-lg font-bold text-white tracking-widest" id="current-view-title">全部商品與服務</h2><button onclick="navFrontBack()" class="text-xs text-gray-500 font-bold hover:text-white transition"><i class="fa-solid fa-arrow-left"></i> 返回</button></div><div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="product-list"></div></div>
    <div id="checkout-view" class="px-4 py-8 hidden">
      <div class="flex justify-between items-end mb-6 border-b border-slate-800 pb-2">
        <h2 class="text-lg font-bold text-white tracking-widest">訂單結帳 <span class="en-sub inline ml-1">CHECKOUT</span></h2>
        <button onclick="showSection('home')" class="text-xs text-gray-500 font-bold hover:text-white transition"><i class="fa-solid fa-arrow-left"></i> 繼續購物</button>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- 左欄：購物清單 -->
        <div class="bg-darkbg border border-slate-700 p-5 rounded space-y-4 shadow-lg h-fit">
          <h4 class="text-white font-bold border-l-4 border-neoncyan pl-2 text-sm">購物清單明細</h4>
          <div id="checkout-cart-items" class="space-y-3"></div>
          <div class="border-t border-slate-700 pt-3 space-y-2">
            <div class="flex justify-between text-sm text-gray-400">
              <span>商品小計</span><span id="checkout-subtotal" class="font-tech">NT$ 0</span>
            </div>
            <div class="flex justify-between text-sm text-gray-400">
              <span>運費</span><span id="checkout-shipping-fee" class="font-tech">—</span>
            </div>
            <div id="checkout-discount-row" class="hidden flex justify-between text-sm text-neoncyan">
              <span id="checkout-discount-label">優惠折抵</span><span id="checkout-discount" class="font-tech">-NT$ 0</span>
            </div>
            <div id="checkout-coupon-list" class="space-y-1.5"></div>
            <div class="flex gap-2 pt-1">
              <input id="coupon-code-input" type="text" placeholder="輸入優惠碼" class="flex-1 bg-panelbg border border-slate-600 text-white text-xs p-2 rounded outline-none focus:border-neoncyan transition uppercase" style="text-transform:uppercase">
              <button onclick="applyCoupon()" class="px-3 py-2 bg-slate-700 text-neoncyan text-xs font-bold rounded hover:bg-neoncyan hover:text-black transition">套用</button>
            </div>
            <div class="flex justify-between text-white font-bold pt-2 border-t border-slate-700">
              <span>總計金額</span><span id="checkout-total" class="text-goldlight font-tech text-lg">NT$ 0</span>
            </div>
          </div>
        </div>
        <!-- 右欄：配送 / 付款 / 顧客資料 -->
        <div class="space-y-6">
          <!-- 配送與付款 -->
          <div class="bg-darkbg border border-slate-700 p-5 rounded space-y-5 shadow-lg">
            <h4 class="text-white font-bold border-l-4 border-neoncyan pl-2 text-sm">取貨方式 <span class="text-neonred">*</span></h4>
            <!-- 取貨方式卡片 -->
            <div class="grid grid-cols-3 gap-3" id="shipping-cards">
              <!-- 超商取貨 -->
              <button type="button" onclick="selectShipping('cvs')" id="ship-card-cvs" class="ship-card flex flex-col items-center justify-center gap-1.5 p-4 focus:outline-none">
                <i class="fa-solid fa-store ship-card-icon"></i>
                <span class="ship-card-title">超商取貨</span>
                <span class="ship-card-sub">需先付款</span>
                <span class="ship-card-fee">免運費</span>
              </button>
              <!-- 宅配到府 -->
              <button type="button" onclick="selectShipping('home')" id="ship-card-home" class="ship-card flex flex-col items-center justify-center gap-1.5 p-4 focus:outline-none">
                <i class="fa-solid fa-truck ship-card-icon"></i>
                <span class="ship-card-title">宅配到府</span>
                <span class="ship-card-sub">需先付款</span>
                <span class="ship-card-fee">$100 起</span>
              </button>
              <!-- 門市自取 -->
              <button type="button" onclick="selectShipping('store')" id="ship-card-store" class="ship-card flex flex-col items-center justify-center gap-1.5 p-4 focus:outline-none">
                <i class="fa-solid fa-shop ship-card-icon"></i>
                <span class="ship-card-title">門市自取</span>
                <span class="ship-card-sub">可現場付款</span>
                <span class="ship-card-fee">免運費</span>
              </button>
            </div>
            <!-- 運費提示 -->
            <div id="shipping-fee-hint" class="hidden text-xs text-gray-500 bg-darkbg border border-slate-700 px-3 py-2 rounded">
              <i class="fa-solid fa-circle-info text-neoncyan mr-1"></i><span id="shipping-fee-hint-text"></span>
            </div>
            <!-- 付款方式卡片 -->
            <div>
              <label class="text-xs text-gray-400 block mb-2">付款方式 <span class="text-neonred">*</span></label>
              <!-- 尚未選取取貨方式時的提示 -->
              <p id="pay-placeholder" class="text-xs text-gray-500 text-center py-3 border border-dashed border-slate-700 rounded">
                <i class="fa-solid fa-arrow-up mr-1 text-neoncyan/40"></i>請先選擇取貨方式
              </p>
              <!-- 付款卡片容器，依取貨方式動態顯示 -->
              <div id="pay-cards" class="hidden grid grid-cols-3 gap-3">
                <!-- 銀行轉帳 -->
                <button type="button" onclick="selectPayment('transfer')" id="pay-card-transfer"
                  class="pay-card ship-card flex flex-col items-center justify-center gap-1.5 p-3 focus:outline-none">
                  <i class="fa-solid fa-building-columns ship-card-icon pay-card-icon"></i>
                  <span class="ship-card-title pay-card-title">銀行轉帳</span>
                  <span class="ship-card-sub pay-card-sub">需回傳截圖</span>
                </button>
                <!-- LINE Pay -->
                <button type="button" onclick="selectPayment('linepay')" id="pay-card-linepay"
