<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>重設密碼 | Apple911</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --darkbg:   #050505;
      --panelbg:  #0a0f18;
      --cyan:     #00f3ff;
      --cyan-dim: rgba(0,243,255,0.15);
      --gold:     #e2c78e;
      --gold-dark:#b38539;
      --red:      #ff003c;
      --text-sub: #6b7280;
    }

    html, body {
      min-height: 100%;
      background-color: var(--darkbg);
      font-family: 'Noto Sans TC', sans-serif;
      color: #fff;
    }

    body {
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0,243,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0,243,255,0.03) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ── Tech clip polygon (same as index.html) ── */
    .tech-clip {
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
    }

    /* ── Card ── */
    .card {
      background-color: var(--panelbg);
      border-top: 2px solid var(--cyan);
      box-shadow: 0 0 30px rgba(0,243,255,0.15);
      width: 100%;
      max-width: 380px;
      overflow: hidden;
    }

    /* ── Card header ── */
    .card-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-align: center;
    }

    .brand-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #fff;
    }
    .brand-title span {
      background: linear-gradient(135deg, #e2c78e 0%, #b38539 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-sub {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-sub);
      margin-top: 4px;
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 4px;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ── Card body ── */
    .card-body {
      padding: 24px;
    }

    /* ── Input group with eye icon ── */
    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group input {
      width: 100%;
      background-color: var(--darkbg);
      border: 1px solid #334155;
      color: #fff;
      padding: 12px 44px 12px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
      font-family: 'Noto Sans TC', sans-serif;
    }
    .input-group input::placeholder { color: #4b5563; }
    .input-group input:focus { border-color: var(--cyan); }

    .eye-btn {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 44px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: #4b5563;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .eye-btn:hover { color: var(--cyan); }

    /* ── Primary button ── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background-color: var(--cyan);
      color: #000;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 4px;
      border: none;
      cursor: pointer;
      clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
      box-shadow: 0 0 15px rgba(0,243,255,0.2);
      transition: background-color 0.2s, opacity 0.2s;
      font-family: 'Noto Sans TC', sans-serif;
      margin-bottom: 12px;
    }
    .btn-primary:hover { background-color: #fff; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Secondary / ghost button ── */
    .btn-ghost {
      display: block;
      text-align: center;
      width: 100%;
      padding: 10px;
      font-size: 12px;
      color: var(--text-sub);
      cursor: pointer;
      background: transparent;
      border: none;
      letter-spacing: 1px;
      transition: color 0.2s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .btn-ghost:hover { color: #fff; }

    /* ── Toast / message ── */
    .msg {
      display: none;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .msg.error {
      background: rgba(255,0,60,0.12);
      border: 1px solid rgba(255,0,60,0.35);
      color: #ff6b8a;
    }
    .msg.success {
      background: rgba(0,243,255,0.08);
      border: 1px solid rgba(0,243,255,0.3);
      color: var(--cyan);
    }

    /* ── Success state card ── */
    .success-icon {
      text-align: center;
      font-size: 42px;
      margin-bottom: 16px;
    }
    .success-title {
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 3px;
      margin-bottom: 10px;
    }
    .success-body {
      text-align: center;
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.8;
      margin-bottom: 24px;
    }

    /* ── Scan line animation (decorative) ── */
    .scan-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: scan 3s linear infinite;
      opacity: 0.3;
      pointer-events: none;
    }
    @keyframes scan {
      0%   { transform: translateY(0); }
      100% { transform: translateY(380px); }
    }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ── Card ── -->
  <div class="card tech-clip" style="position:relative;overflow:hidden;">
    <div class="scan-line"></div>

    <!-- Header -->
    <div class="card-header">
      <div class="brand-title">APPLE<span>911</span></div>
      <div class="brand-sub">配件怪獸 × 專業維修</div>
      <div class="section-title">
        <i class="fa-solid fa-key"></i>
        RESET PASSWORD
      </div>
    </div>

    <!-- Body: form state -->
    <div class="card-body" id="form-state">
      <div class="msg error" id="msg-error"></div>

      <!-- New password -->
      <div class="input-group">
        <input id="new-password" type="password" placeholder="設定密碼（大寫+小寫+數字，至少8碼）" autocomplete="new-password">
        <button class="eye-btn" type="button" onclick="toggleEye('new-password','eye1')" tabindex="-1" aria-label="切換密碼顯示">
          <i id="eye1" class="fa-solid fa-eye"></i>
        </button>
      </div>

      <!-- Confirm password -->
      <div class="input-group">
        <input id="confirm-password" type="password" placeholder="確認新密碼 CONFIRM PASSWORD" autocomplete="new-password">
        <button class="eye-btn" type="button" onclick="toggleEye('confirm-password','eye2')" tabindex="-1" aria-label="切換確認密碼顯示">
          <i id="eye2" class="fa-solid fa-eye"></i>
        </button>
      </div>

      <button class="btn-primary" id="submit-btn" onclick="doReset()">
        重設密碼 RESET
      </button>
      <button class="btn-ghost" onclick="goLogin()">
        ← 返回登入頁 BACK TO LOGIN
      </button>
    </div>

    <!-- Body: success state (hidden initially) -->
    <div class="card-body" id="success-state" style="display:none;">
      <div class="success-icon">✅</div>
      <div class="success-title">密碼已成功更新</div>
      <div class="success-body">
        您的 Apple911 會員密碼已重設完成。<br>
        請使用新密碼重新登入。
      </div>
      <button class="btn-primary" onclick="goLogin()">
        返回登入頁 LOGIN
      </button>
    </div>

  </div><!-- /card -->

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp }       from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
    import { getAuth, confirmPasswordReset }
                                    from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';

    // ── Firebase config（與 index.html 一致，從全域取得）────────────────────────
    // 這裡直接從 URL 讀取 oobCode，不需要額外的 Firebase config 初始化
    // 因為 confirmPasswordReset 只需要 oobCode，Firebase 會自行處理
    // 但仍需初始化一個 app 來取得 auth instance
    // 請確保以下 config 與你的 index.html 的 Firebase config 相同
    const firebaseConfig = {
      apiKey:            "AIzaSyDpasiFnj0UQpNKndmya4__C1J8bJxGN4g",
      authDomain:        "apple911-shop.firebaseapp.com",
      projectId:         "apple911-shop",
      storageBucket:     "apple911-shop.firebasestorage.app",
      messagingSenderId: "335224055176",
      appId:             "1:335224055176:web:62f37cdf81f6233c16063d",
    };

    // 初始化（避免重複）
    let _app;
    try {
      // 若主頁同域並已初始化則沿用，否則新建
      const { getApps, getApp } = await import('https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js');
      _app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    } catch(e) {
      _app = initializeApp(firebaseConfig, 'reset-pw-app');
    }
    const _auth = getAuth(_app);

    // 掛到 window 供 doReset() 使用
    window._fbAuth = _auth;
    window._confirmPasswordReset = confirmPasswordReset;
  </script>

  <!-- 必須與 index.html 同域時，直接讀取 Firebase config 的方式 -->
  <!-- 如果你的 index.html 有把 config 存成全域變數，可以從那邊繼承 -->
  <!-- 否則請在下方填入實際的 Firebase config -->
  <script>
    // ── 讀取 URL 的 oobCode ─────────────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const oobCode   = urlParams.get('oobCode');

    // 若沒有 oobCode，顯示錯誤
    if (!oobCode) {
      const errEl = document.getElementById('msg-error');
      errEl.textContent = '連結無效或已過期，請重新申請密碼重設信。';
      errEl.style.display = 'block';
      document.getElementById('submit-btn').disabled = true;
    }

    // ── 眼睛 toggle（與 index.html toggleRegPassword 同邏輯）─────────────────────
    function toggleEye(inputId, eyeId) {
      const inp = document.getElementById(inputId);
      const eye = document.getElementById(eyeId);
      if (inp.type === 'password') {
        inp.type = 'text';
        eye.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        inp.type = 'password';
        eye.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
    window.toggleEye = toggleEye;

    // ── 返回登入頁 ──────────────────────────────────────────────────────────────
    function goLogin() {
      window.location.href = '/';
    }
    window.goLogin = goLogin;

    // ── 執行密碼重設 ─────────────────────────────────────────────────────────────
    async function doReset() {
      const errEl   = document.getElementById('msg-error');
      const btn     = document.getElementById('submit-btn');
      const newPw   = document.getElementById('new-password').value;
      const confPw  = document.getElementById('confirm-password').value;

      // 清除舊錯誤
      errEl.style.display = 'none';
      errEl.textContent = '';

      // 驗證
      if (!newPw || !confPw) {
        errEl.textContent = '請填寫所有欄位。';
        errEl.style.display = 'block';
        return;
      }
      const pwPattern = /^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9]).{8,}$/;
      if (!pwPattern.test(newPw)) {
        errEl.textContent = '密碼需包含大寫英文、小寫英文與數字，且至少 8 碼';
        errEl.style.display = 'block';
        return;
      }
      if (newPw !== confPw) {
        errEl.textContent = '兩次輸入的密碼不一致，請重新確認。';
        errEl.style.display = 'block';
        return;
      }
      if (!oobCode) {
        errEl.textContent = '連結無效或已過期，請重新申請密碼重設信。';
        errEl.style.display = 'block';
        return;
      }

      // 等待 Firebase SDK 載入
      if (!window._fbAuth || !window._confirmPasswordReset) {
        errEl.textContent = '系統初始化中，請稍候再試。';
        errEl.style.display = 'block';
        return;
      }

      // 送出
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>處理中…';

      try {
        await window._confirmPasswordReset(window._fbAuth, oobCode, newPw);
        // 成功：切換到成功畫面
        document.getElementById('form-state').style.display    = 'none';
        document.getElementById('success-state').style.display = 'block';
      } catch (e) {
        console.error('[reset-password]', e.code, e.message);
        const errMsg =
          e.code === 'auth/invalid-action-code'    ? '連結無效或已過期，請重新申請密碼重設信。' :
          e.code === 'auth/expired-action-code'    ? '連結已過期（超過 60 分鐘），請重新申請。' :
          e.code === 'auth/weak-password'           ? '密碼需包含大寫英文、小寫英文與數字，且至少 8 碼' :
          e.code === 'auth/user-disabled'           ? '此帳號已被停用，請聯絡客服。' :
          e.code === 'auth/user-not-found'          ? '找不到此帳號，請確認信箱是否正確。' :
          '重設失敗，請稍後再試或重新申請重設信。';
        errEl.textContent = errMsg;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '重設密碼 RESET';
      }
    }
    window.doReset = doReset;
  </script>
</body>
</html>
